name: Docker Build and Push

# 언제 실행할 것인가? (main 브랜치에 push가 일어날 때)
on:
  push:
    branches: [ "master" ]

jobs:
  build-and-push:
    runs-on: ubuntu-latest # GitHub가 제공하는 가상 서버에서 실행

    steps:
    - name: Checkout code
      uses: actions/checkout@v4 # 내 코드를 가상 서버로 가져옴

    - name: Login to Docker Hub
      uses: docker/login-action@v3
      with:
        username: ${{ secrets.DOCKER_USERNAME }}
        password: ${{ secrets.DOCKER_PASSWORD }}

    - name: Set up Docker Buildx
      uses: docker/setup-buildx-action@v3 # 고성능 빌드 도구 설정

    - name: Build and push
      uses: docker/build-push-action@v5
      with:
        context: .
        push: true
        # 여기 [내아이디] 부분을 실제 도커 허브 아이디로 바꿔주세요!
        tags: mintae818/my-networking-app:latest